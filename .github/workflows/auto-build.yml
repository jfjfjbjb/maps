name: Auto Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'openlayers/**'
      - 'cesium/**'
      - 'index.html'
      - 'static/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            openlayers:
              - 'openlayers/**'
            cesium:
              - 'cesium/**'
            root:
              - 'index.html'
              - 'static/**'

      - name: Build openlayers
        if: steps.filter.outputs.openlayers == 'true'
        run: cd openlayers && npm ci && npm run build

      - name: Build cesium
        if: steps.filter.outputs.cesium == 'true'
        run: cd cesium && npm ci && npm run build

      - name: Prepare site
        run: |
          mkdir -p _site
          if [ "${{ steps.filter.outputs.root }}" = "true" ]; then
            cp index.html _site/
            [ -d static ] && cp -r static _site/ || true
          fi
          if [ "${{ steps.filter.outputs.openlayers }}" = "true" ]; then
            cp -r openlayers/dist _site/openlayers/
          fi
          if [ "${{ steps.filter.outputs.cesium }}" = "true" ]; then
            cp -r cesium/dist _site/cesium/
          fi

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          keep_files: true
