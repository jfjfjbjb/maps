name: Auto Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'openlayers/**'
      - 'cesium/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            openlayers:
              - 'openlayers/**'
            cesium:
              - 'cesium/**'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build openlayers
        if: steps.changes.outputs.openlayers == 'true'
        run: cd openlayers && npm ci && npm run build

      - name: Build cesium
        if: steps.changes.outputs.cesium == 'true'
        run: cd cesium && npm ci && npm run build

      - name: Prepare deploy directory
        if: steps.changes.outputs.openlayers == 'true' || steps.changes.outputs.cesium == 'true'
        run: |
          mkdir _deploy
          cp index.html _deploy/
          cp -r static _deploy/
          if [ "${{ steps.changes.outputs.openlayers }}" = "true" ]; then
            cp -r openlayers/dist _deploy/openlayers/
          fi
          if [ "${{ steps.changes.outputs.cesium }}" = "true" ]; then
            cp -r cesium/dist _deploy/cesium/
          fi

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.openlayers == 'true' || steps.changes.outputs.cesium == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          keep_files: true
