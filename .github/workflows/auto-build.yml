name: Auto Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'openlayers/**'
      - 'cesium/**'
      - 'index.html'
      - 'static/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            openlayers:
              - 'openlayers/**'
            cesium:
              - 'cesium/**'
            root:
              - 'index.html'
              - 'static/**'

      - name: Cache site
        uses: actions/cache@v4
        with:
          path: _site
          key: site-${{ runner.os }}-${{ hashFiles('openlayers/**', 'cesium/**', 'index.html', 'static/**') }}
          restore-keys: |
            site-${{ runner.os }}-

      - name: Build openlayers
        if: steps.filter.outputs.openlayers == 'true'
        run: cd openlayers && npm ci && npm run build

      - name: Build cesium
        if: steps.filter.outputs.cesium == 'true'
        run: cd cesium && npm ci && npm run build

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html -r static _site/
          if [ "${{ steps.filter.outputs.openlayers }}" = "true" ]; then
            cp -r openlayers/dist _site/openlayers/
          fi
          if [ "${{ steps.filter.outputs.cesium }}" = "true" ]; then
            cp -r cesium/dist _site/cesium/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: './_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
