name: Auto Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'openlayers/**'
      - 'cesium/**'
      - 'index.html'
      - 'static/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build openlayers
        run: cd openlayers && npm ci && npm run build

      - name: Build cesium
        run: cd cesium && npm ci && npm run build

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html _site/
          [ -d static ] && cp -r static _site/ || true
          cp -r openlayers/dist _site/openlayers/
          cp -r cesium/dist _site/cesium/

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - uses: actions/deploy-pages@v5
        id: deployment
