<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图项目预览</title>
    <link rel="icon" href="./static/logo.svg" type="image/svg+xml">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
        min-height: 100vh;
        background: #0a0a0f;
        color: #e5e5e5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 600px;
      }

      .header {
        margin-bottom: 64px;
      }

      .title {
        font-size: 42px;
        font-weight: 600;
        color: #fff;
        letter-spacing: -1px;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 13px;
        color: #555;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .divider {
        width: 40px;
        height: 2px;
        background: linear-gradient(90deg, #667eea, #764ba2);
        margin-top: 24px;
      }

      .section-label {
        font-size: 11px;
        color: #444;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 16px;
      }

      .demo-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 2px;
        border-top: 1px solid #1a1a1a;
      }

      .demo-list li {
        border-bottom: 1px solid #1a1a1a;
      }

      .demo-list a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 0;
        text-decoration: none;
        color: #999;
        font-size: 15px;
        transition: all 0.2s ease;
      }

      .demo-list a:hover {
        color: #fff;
      }

      .demo-list a.disabled {
        color: #333;
        cursor: default;
        pointer-events: none;
      }

      .demo-name {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .demo-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: #151520;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      .demo-list a:hover .demo-icon {
        background: #1f1f2e;
      }

      .demo-list a.disabled .demo-icon {
        background: #0f0f14;
      }

      .demo-meta {
        font-size: 12px;
        color: #444;
        letter-spacing: 1px;
      }

      .demo-list a:hover .demo-meta {
        color: #666;
      }

      .demo-list a.disabled .demo-meta {
        color: #2a2a2a;
      }

      .arrow {
        font-size: 16px;
        opacity: 0;
        transform: translateX(-6px);
        transition: all 0.2s ease;
      }

      .demo-list a:hover .arrow {
        opacity: 1;
        transform: translateX(0);
      }

      .footer {
        margin-top: 48px;
        padding-top: 24px;
        border-top: 1px solid #1a1a1a;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .footer-text {
        font-size: 12px;
        color: #333;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #444;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #333;
      }

      .status-dot.active {
        background: #22c55e;
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="title">Map Gallery</h1>
        <p class="subtitle">地图项目集</p>
        <div class="divider"></div>
      </header>

      <section>
        <p class="section-label">Demo</p>
        <ul class="demo-list">
          <li>
            <a href="./openlayers/dist/index.html" target="_blank">
              <div class="demo-name">
                <div class="demo-icon">◎</div>
                <span>OpenLayers Demo</span>
              </div>
              <div style="display: flex; align-items: center; gap: 16px;">
                <span class="demo-meta">v1.0</span>
                <span class="arrow">→</span>
              </div>
            </a>
          </li>
          <li>
            <a href="#" class="disabled">
              <div class="demo-name">
                <div class="demo-icon">◎</div>
                <span>待添加...</span>
              </div>
              <span class="demo-meta">v0.0</span>
            </a>
          </li>
        </ul>
      </section>
    </div>
  </body>
</html>
